name: Code Quality (Informational)

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0  # Need full history to diff against base

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Determine PR-changed files
        id: changed
        run: |
          # Get the list of C/C++ files changed in this PR
          git fetch origin ${{ github.base_ref }}
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | \
                    grep -E '\.(c|cpp|cc|cxx|h|hpp)$' || true)
          echo "Changed files in this PR:"
          echo "$changed"
          
          # Save to file for later use
          echo "$changed" > /tmp/changed_files.txt

      - name: Run cppcheck and capture output
        continue-on-error: true
        run: |
          echo "::notice::cppcheck output is informational and does not block merging"
          touch /tmp/cppcheck_output.txt
          
          find . \( -name "*.c" -o -name "*.cpp" -o -name "*.cc" \) -type f | while read -r file; do
            cppcheck --enable=warning,style,performance,portability \
                     --suppress=missingIncludeSystem \
                     --quiet \
                     --template='{file}:{line}: [{severity}] {message} ({id})' \
                     "$file" 2>> /tmp/cppcheck_output.txt || true
            cppcheck --enable=warning,style,performance,portability \
                     --suppress=missingIncludeSystem \
                     --quiet \
                     --template='::warning file={file},line={line},col={column}::{severity}: {message} [{id}]' \
                     "$file" 2>&1 || true
          done

      - name: Generate report (PR comment + workflow summary)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Load all findings
            const allOutput = fs.readFileSync('/tmp/cppcheck_output.txt', 'utf8').trim();
            const allLines = allOutput ? allOutput.split('\n').filter(l => l.trim()) : [];
            
            // Load PR-changed files
            const changedFilesRaw = fs.readFileSync('/tmp/changed_files.txt', 'utf8').trim();
            const changedFiles = changedFilesRaw ? new Set(changedFilesRaw.split('\n').filter(l => l.trim())) : new Set();
            
            // Parse a finding line into structured data
            function parseFinding(line) {
              const match = line.match(/^(.+?):(\d+):\s*\[(\w+)\]\s+(.+?)\s+\(([^)]+)\)$/);
              if (!match) return null;
              const [, file, lineno, severity, message, id] = match;
              // Normalize file path (cppcheck prepends "./", git doesn't)
              const normalizedFile = file.replace(/^\.\//, '');
              return { file: normalizedFile, line: parseInt(lineno), severity, message, id };
            }
            
            const allFindings = allLines.map(parseFinding).filter(f => f !== null);
            const prFindings = allFindings.filter(f => changedFiles.has(f.file));
            
            // Build summary table for a set of findings
            function buildSummary(findings) {
              const counts = { error: 0, warning: 0, style: 0, performance: 0, portability: 0, information: 0 };
              for (const f of findings) {
                if (counts[f.severity] !== undefined) counts[f.severity]++;
              }
              let table = '| Severity | Count |\n|----------|------:|\n';
              const order = ['error', 'warning', 'style', 'performance', 'portability', 'information'];
              let any = false;
              for (const sev of order) {
                if (counts[sev] > 0) {
                  table += `| ${sev} | ${counts[sev]} |\n`;
                  any = true;
                }
              }
              if (!any) {
                table += '| (none) | 0 |\n';
              }
              table += `| **Total** | **${findings.length}** |\n`;
              return table;
            }
            
            // Build findings tables grouped by file
            function buildFileTables(findings, maxFiles) {
              const byFile = {};
              for (const f of findings) {
                if (!byFile[f.file]) byFile[f.file] = [];
                byFile[f.file].push(f);
              }
              const fileNames = Object.keys(byFile).sort();
              const filesToShow = maxFiles ? fileNames.slice(0, maxFiles) : fileNames;
              
              let out = '';
              for (const file of filesToShow) {
                out += `#### \`${file}\`\n\n`;
                out += '| Line | Severity | Issue |\n|-----:|----------|-------|\n';
                for (const f of byFile[file]) {
                  const msg = f.message.replace(/\|/g, '\\|');
                  out += `| ${f.line} | ${f.severity} | ${msg} |\n`;
                }
                out += '\n';
              }
              if (maxFiles && fileNames.length > maxFiles) {
                out += `_... and ${fileNames.length - maxFiles} more files. See the [full workflow summary](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for the complete list._\n\n`;
              }
              return out;
            }
            
            // ========== Build PR comment ==========
            let body = '## Code Quality Suggestions\n\n';
            body += '_These are suggestions from automated analysis tools. They are meant to help, not to gatekeep. Apply what makes sense for your context - whether you are exploring an idea or polishing a final solution. None of these block your PR from merging._\n\n';
            
            // PR-specific section
            body += '### This PR\n\n';
            if (changedFiles.size === 0) {
              body += '_No C/C++ files were changed in this PR._\n\n';
            } else {
              body += `Files modified: **${changedFiles.size}**. Issues attributed to those files: **${prFindings.length}**.\n\n`;
              body += buildSummary(prFindings);
              body += '\n';
              if (prFindings.length > 0) {
                body += '<details open>\n<summary>Issues in this PR\'s files</summary>\n\n';
                body += buildFileTables(prFindings, null);
                body += '</details>\n\n';
              }
            }
            
            body += '---\n\n';
            
            // Repo-wide section
            body += '### Whole Repository (for context)\n\n';
            body += `Total issues across the codebase: **${allFindings.length}**.\n\n`;
            body += buildSummary(allFindings);
            body += '\n';
            body += '<details>\n<summary>Top 30 files with issues (click to expand)</summary>\n\n';
            body += buildFileTables(allFindings, 30);
            body += '</details>\n\n';
            
            body += '---\n\n';
            body += '**What these mean**\n\n';
            body += '- **error**: Likely a real bug (uninitialized variables, leaks, null pointer issues)\n';
            body += '- **warning**: Probable issue worth investigating\n';
            body += '- **style**: Code could be cleaner or follow better practices\n';
            body += '- **performance**: A faster way exists\n';
            body += '- **portability**: May behave differently on other systems\n\n';
            body += `_Generated by [cppcheck](https://cppcheck.sourceforge.io). [View full workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for the complete report including all files._\n`;
            
            // Update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Code Quality Suggestions')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
            
            // ========== Build workflow summary (no truncation) ==========
            let summary = '# Code Quality Full Report\n\n';
            summary += '_Generated by cppcheck. Informational only - does not block merging._\n\n';
            
            summary += '## Summary - This PR\n\n';
            if (changedFiles.size === 0) {
              summary += '_No C/C++ files were changed in this PR._\n\n';
            } else {
              summary += `Files modified in PR: **${changedFiles.size}**\n\n`;
              summary += `Issues in those files: **${prFindings.length}**\n\n`;
              summary += buildSummary(prFindings);
              summary += '\n';
            }
            
            summary += '## Summary - Whole Repository\n\n';
            summary += `Total findings: **${allFindings.length}**\n\n`;
            summary += buildSummary(allFindings);
            summary += '\n';
            
            if (changedFiles.size > 0 && prFindings.length > 0) {
              summary += '## Findings in PR Files\n\n';
              summary += buildFileTables(prFindings, null);
              summary += '\n';
            }
            
            summary += '## All Findings (Whole Repository)\n\n';
            if (allFindings.length === 0) {
              summary += '_No issues found across the entire codebase._\n';
            } else {
              summary += buildFileTables(allFindings, null);
            }
            
            // Write to GITHUB_STEP_SUMMARY
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
