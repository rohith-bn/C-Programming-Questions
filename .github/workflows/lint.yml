name: Code Quality (Informational)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck with annotations and capture output
        continue-on-error: true
        run: |
          echo "::notice::cppcheck output is informational and does not block merging"
          touch /tmp/cppcheck_output.txt
          find . \( -name "*.c" -o -name "*.cpp" -o -name "*.cc" \) -type f | while read -r file; do
            # Capture in plain format for parsing
            cppcheck --enable=warning,style,performance,portability \
                     --suppress=missingIncludeSystem \
                     --quiet \
                     --template='{file}:{line}: [{severity}] {message} ({id})' \
                     "$file" 2>> /tmp/cppcheck_output.txt || true
            # Also emit annotation format for inline display
            cppcheck --enable=warning,style,performance,portability \
                     --suppress=missingIncludeSystem \
                     --quiet \
                     --template='::warning file={file},line={line},col={column}::{severity}: {message} [{id}]' \
                     "$file" 2>&1 || true
          done

      - name: Post formatted summary as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/cppcheck_output.txt', 'utf8').trim();
            const lines = output ? output.split('\n').filter(l => l.trim()) : [];
            
            const findings = [];
            const severityCount = { error: 0, warning: 0, style: 0, performance: 0, portability: 0, information: 0 };
            
            for (const line of lines) {
              const match = line.match(/^(.+?):(\d+):\s*\[(\w+)\]\s+(.+?)\s+\(([^)]+)\)$/);
              if (match) {
                const [, file, lineno, severity, message, id] = match;
                findings.push({ file, line: parseInt(lineno), severity, message, id });
                if (severityCount[severity] !== undefined) severityCount[severity]++;
              }
            }
            
            const byFile = {};
            for (const f of findings) {
              if (!byFile[f.file]) byFile[f.file] = [];
              byFile[f.file].push(f);
            }
            
            let body = '## Code Quality Suggestions\n\n';
            body += '_These are suggestions from automated analysis tools. They are meant to help, not to gatekeep. Apply what makes sense for your context - whether you are exploring an idea or polishing a final solution. None of these block your PR from merging._\n\n';
            
            if (findings.length === 0) {
              body += '### No issues found\n\n';
              body += 'The codebase is clean from cppcheck\'s perspective.\n';
            } else {
              body += '### Summary\n\n';
              body += '| Severity | Count |\n';
              body += '|----------|------:|\n';
              const order = ['error', 'warning', 'style', 'performance', 'portability', 'information'];
              for (const sev of order) {
                if (severityCount[sev] > 0) {
                  body += `| ${sev} | ${severityCount[sev]} |\n`;
                }
              }
              body += `| **Total** | **${findings.length}** |\n\n`;
              body += '---\n\n';
              
              body += '### Findings by file\n\n';
              body += '<details open>\n<summary>Click to collapse</summary>\n\n';
              
              const fileNames = Object.keys(byFile).sort();
              const maxFiles = 30;
              const filesToShow = fileNames.slice(0, maxFiles);
              
              for (const file of filesToShow) {
                body += `#### \`${file}\`\n\n`;
                body += '| Line | Severity | Issue |\n';
                body += '|-----:|----------|-------|\n';
                for (const f of byFile[file]) {
                  const msg = f.message.replace(/\|/g, '\\|');
                  body += `| ${f.line} | ${f.severity} | ${msg} |\n`;
                }
                body += '\n';
              }
              
              if (fileNames.length > maxFiles) {
                body += `\n_... and ${fileNames.length - maxFiles} more files. See the workflow log for the full list._\n\n`;
              }
              
              body += '</details>\n\n';
              body += '---\n\n';
              body += '**What these mean**\n\n';
              body += '- **error**: Likely a real bug (uninitialized variables, null pointer issues)\n';
              body += '- **warning**: Probable issue worth investigating\n';
              body += '- **style**: Code could be cleaner or follow better practices\n';
              body += '- **performance**: A faster way exists\n';
              body += '- **portability**: May behave differently on other systems\n\n';
              body += '_Generated by [cppcheck](https://cppcheck.sourceforge.io). Re-runs on every push._\n';
            }
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Code Quality Suggestions')
            );
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }